name: Monorepo CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  monorepo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build workspace
        run: pnpm build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Lint workspace
        run: pnpm lint

      - name: Generate OpenAPI contract
        run: pnpm backend:openapi:generate

      - name: Enforce OpenAPI drift policy
        run: pnpm backend:openapi:check

      - name: Test workspace
        run: pnpm test
