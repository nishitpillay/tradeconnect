name: Monorepo CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  shared-backend-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            web/package-lock.json
            mobile/package-lock.json
            packages/shared/package-lock.json

      - name: Install shared dependencies
        working-directory: packages/shared
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build backend
        run: npm run backend:build

      - name: Generate OpenAPI contract
        run: npm --prefix backend run openapi:generate

      - name: Enforce OpenAPI drift policy
        run: npm --prefix backend run openapi:check-drift

      - name: Test backend
        run: npm run backend:test

      - name: Build web
        run: npm run web:build

  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            mobile/package-lock.json
            packages/shared/package-lock.json

      - name: Install shared dependencies
        working-directory: packages/shared
        run: npm ci

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Build shared package
        run: npm run shared:build

      - name: Type-check mobile
        run: npm run mobile:type-check
