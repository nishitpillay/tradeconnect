name: Android Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  android-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          path: mobile

      - name: Checkout shared package
        uses: actions/checkout@v4
        with:
          repository: nishitpillay/remoteRepo
          path: packages/shared

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Type-check mobile
        working-directory: mobile
        run: npm run type-check

      - name: Android emulator smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: |
            cd mobile
            pwsh -File scripts/android-smoke.ps1
