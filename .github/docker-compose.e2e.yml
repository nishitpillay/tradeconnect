services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: tc_user
      POSTGRES_PASSWORD: tc_dev_password
      POSTGRES_DB: tradeconnect_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tc_user -d tradeconnect_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      API_BASE_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      DATABASE_URL: postgresql://tc_user:tc_dev_password@postgres:5432/tradeconnect_dev
      DB_SSL_ENABLED: "false"
      DB_POOL_MAX: "10"
      SLOW_QUERY_MS: "300"
      DB_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
      JWT_SECRET: "0123456789abcdef0123456789abcdef"
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 30d
      AWS_REGION: ap-southeast-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET_NAME: tc-test
      CDN_BASE_URL: http://localhost:4566/tc-test
      S3_ENDPOINT: http://localhost:4566
      S3_PRESIGN_EXPIRY_SECONDS: "3600"
      FIREBASE_PROJECT_ID: tradeconnect-test
      FIREBASE_CLIENT_EMAIL: test@tradeconnect-test.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\\nTEST\\n-----END PRIVATE KEY-----\\n"
      GOOGLE_MAPS_API_KEY: test
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: "tc:"
      LOG_LEVEL: info
      SENTRY_TRACES_SAMPLE_RATE: "0"
      SENTRY_PROFILES_SAMPLE_RATE: "0"
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: tradeconnect-backend
      WORKER_CONCURRENCY: "5"
      WORKER_METRICS_INTERVAL_MS: "60000"
      WORKER_DLQ_ENABLED: "true"
      NOTIFICATIONS_USE_QUEUE: "true"
      NOTIFICATION_MAX_ATTEMPTS: "5"
      NOTIFICATION_BACKOFF_MS: "1000"
      NOTIFICATION_DEDUPE_TTL_SECONDS: "300"
      JOB_EXPIRY_DAYS: "30"
      QUOTE_EXPIRY_DAYS: "14"
      REVIEW_WINDOW_DAYS: "60"
      MESSAGE_RETENTION_MONTHS: "24"
      PII_VIOLATIONS_BEFORE_FLAG: "3"
      PII_VIOLATIONS_BEFORE_SUSPEND: "5"
      SOCKET_IO_REDIS_ADAPTER_ENABLED: "true"
      SOCKET_IO_MAX_HTTP_BUFFER_BYTES: "262144"
      SOCKET_IO_MAX_EVENT_PAYLOAD_BYTES: "8192"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
