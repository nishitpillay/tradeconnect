version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: tc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tc_user
      POSTGRES_PASSWORD: tc_dev_password
      POSTGRES_DB: tradeconnect_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tc_user -d tradeconnect_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
